name: Publish Node.js Package to Registry

on:
  workflow_call:
    inputs:
      registry_url:
        description: 'NPM registry URL'
        required: true
        type: string
      node_version:
        description: 'Node version to use'
        required: true
        type: string
        default: '20'
      scope:
        description: 'Scope for npm package (e.g., openimis for @openimis/*)'
        required: false
        type: string
        default: 'openimis'
      access:
        description: 'Access level for npm package (e.g., public)'
        required: false
        type: string
        default: 'public'
      tag:
        description: 'Optional tag for the published package (e.g., latest, beta)'
        required: false
        type: string
    secrets:
      NPM_TOKEN:
        description: 'NPM authentication token'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.registry_url }}
          scope: ${{ inputs.scope }}

      - name: Install dependencies
        run: npm ci

      - name: Publish package
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            npm publish --tag ${{ inputs.tag }} --access ${{ inputs.access }}
          else
            npm publish --access ${{ inputs.access }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}