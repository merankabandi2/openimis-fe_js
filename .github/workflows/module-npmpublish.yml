name: Publish Node.js Package to Registry

on:
  workflow_call:
    inputs:
      registry_url:
        description: 'NPM registry URL'
        required: true
        type: string
        default: 'https://registry.npmjs.org/'
      node_version:
        description: 'Node version to use'
        required: true
        type: string
        default: '20'
      scope:
        description: 'Scope for npm package (e.g., openimis for @openimis/*)'
        required: false
        type: string
        default: 'openimis'
      access:
        description: 'Access level for npm package (e.g., public)'
        required: false
        type: string
        default: 'public'
      tag:
        description: 'Optional tag for the published package (e.g., latest, beta)'
        required: false
        type: string
    secrets:
      NPM_TOKEN:
        description: 'NPM authentication token'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for git fetch --tags

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.registry_url }}
          scope: ${{ inputs.scope }}

      - name: Update version with TAG
        run: |
          TAG_NAME="${{ inputs.tag }}"
          if [ -z "$TAG_NAME" ]; then
            if [ "${{ github.event_name }}" == "release" ]; then
              TAG_NAME="${{ github.event.release.tag_name }}"
            else
              git fetch --tags
              TAG_NAME=$(git tag --sort=-version:refname | head -n 1)
            fi
          fi
          echo "tag to use $TAG_NAME"
          jq --arg a "$TAG_NAME" '.version = $a' package.json > temp.json && mv temp.json package.json

      - name: Install dependencies
        run: yarn install

      - name: Publish package
        run: |
          ACCESS_FLAG=""
          TAG_FLAG=""
      
          if [ -n "${{ inputs.access }}" ]; then
            ACCESS_FLAG="--access ${{ inputs.access }}"
          fi
      
          if [ -n "${{ inputs.tag }}" ]; then
            TAG_FLAG="--tag ${{ inputs.tag }}"
          fi
          echo "yarn publish $ACCESS_FLAG $TAG_FLAG --no-git-tag-version"
          yarn publish $ACCESS_FLAG $TAG_FLAG --no-git-tag-version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
